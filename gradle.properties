# Keep the daemon smaller so KAPT worker JVMs can still start on Windows.
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC -XX:MaxMetaspaceSize=512m
kotlin.daemon.jvmargs=-Xmx1g -Xms256m -XX:+UseParallelGC

# Enable Gradle build cache
org.gradle.caching=true

# Enable configuration on demand (faster builds)
org.gradle.configureondemand=false

# Limit concurrent worker JVMs to avoid exhausting the Windows commit limit.
org.gradle.parallel=false
org.gradle.workers.max=2
