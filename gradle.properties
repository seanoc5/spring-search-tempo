# Increase Gradle daemon memory for builds with Stanford CoreNLP models
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=768m

# Enable Gradle build cache
org.gradle.caching=true

# Enable configuration on demand (faster builds)
org.gradle.configureondemand=false

# Enable parallel execution
org.gradle.parallel=true
