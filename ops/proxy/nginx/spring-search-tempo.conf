# Spring Search Tempo dev/LAN reverse proxy for nginx.
#
# Usage:
# - Place this file in /etc/nginx/conf.d/ (or include from nginx.conf)
# - Update server_name and certificate paths
# - nginx -t && sudo systemctl reload nginx
#
# This assumes Spring Boot (Tomcat) listens on 127.0.0.1:8082.

# Keep websocket/upgrade compatibility if needed by future features.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name tempo.local 192.168.1.100;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tempo.local 192.168.1.100;

    # Replace with your cert/key (mkcert, self-signed, or private CA).
    ssl_certificate     /etc/nginx/certs/tempo.crt;
    ssl_certificate_key /etc/nginx/certs/tempo.key;

    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
