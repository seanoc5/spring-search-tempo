spring:
  sql:
    init:
      mode: always  # Run schema.sql to enable pgvector extension
  jpa:
    hibernate:
      ddl-auto: create-drop  # Auto-create schema for tests
    show-sql: false
  batch:
    job:
      enabled: false  # Disable batch jobs during tests unless explicitly needed
    jdbc:
      initialize-schema: always  # Create batch tables for tests
  session:
    jdbc:
      initialize-schema: always  # Create session tables for tests
