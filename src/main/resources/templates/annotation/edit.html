<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">
    <head>
        <title>[[#{annotation.edit.headline}]]</title>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="d-flex flex-wrap mb-4">
                <h1 class="flex-grow-1">[[#{annotation.edit.headline}]]</h1>
                <div>
                    <a th:href="@{/annotations}" class="btn btn-secondary">[[#{annotation.edit.back}]]</a>
                </div>
            </div>
            <div th:replace="~{fragments/forms::globalErrors('annotation')}" />
            <form th:action="${requestUri}" method="post" novalidate="">
                <div th:replace="~{fragments/forms::inputRow(object='annotation', field='id', disabled=true, type='number')}" />
                <div th:replace="~{fragments/forms::inputRow(object='annotation', field='label', required=true, type='textarea')}" />
                <div th:replace="~{fragments/forms::inputRow(object='annotation', field='description', type='textarea')}" />
                <div th:replace="~{fragments/forms::inputRow(object='annotation', field='type', type='textarea')}" />
                <input type="submit" th:value="#{annotation.edit.headline}" class="btn btn-primary mt-4" />
            </form>
        </div>
    </body>
</html>
