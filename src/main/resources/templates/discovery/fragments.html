<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Status Panel Fragment -->
<th:block th:fragment="statusPanel(session)">
    <div class="card-header bg-light">
        <h6 class="mb-0">
            <i class="bi bi-bar-chart me-2"></i>
            Classification Status
        </h6>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <div class="d-flex justify-content-between small mb-1">
                <span>Progress</span>
                <span th:text="|${session.classifiedFolders} / ${session.totalFolders}|">0 / 0</span>
            </div>
            <div class="progress" style="height: 8px;">
                <div class="progress-bar bg-success" role="progressbar"
                     th:style="|width: ${session.totalFolders > 0 ? (session.classifiedFolders * 100 / session.totalFolders) : 0}%|">
                </div>
            </div>
        </div>

        <table class="table table-sm mb-0">
            <tr>
                <td><span class="badge status-skip">SKIP</span></td>
                <td class="text-end" th:text="${session.skipCount}">0</td>
            </tr>
            <tr>
                <td><span class="badge status-locate">LOCATE</span></td>
                <td class="text-end" th:text="${session.locateCount}">0</td>
            </tr>
            <tr>
                <td><span class="badge status-index">INDEX</span></td>
                <td class="text-end" th:text="${session.indexCount}">0</td>
            </tr>
            <tr th:if="${session.analyzeCount != null && session.analyzeCount > 0}">
                <td><span class="badge status-analyze">ANALYZE</span></td>
                <td class="text-end" th:text="${session.analyzeCount}">0</td>
            </tr>
        </table>
    </div>
</th:block>

<!-- Folder Children Fragment (for lazy loading) -->
<th:block th:fragment="folderChildren">
    <div th:each="folder : ${folders}" class="folder-item"
         th:classappend="${folder.isHidden} ? 'hidden-folder' : ''"
         th:data-folder-id="${folder.id}">
        <div class="d-flex align-items-center">
            <input type="checkbox" class="form-check-input me-2 folder-checkbox"
                   th:data-folder-id="${folder.id}">
            <i class="bi bi-folder me-1 text-warning"></i>
            <span class="folder-name flex-grow-1" th:text="${folder.name}">folder</span>
            <span class="text-muted small me-2">
                <span th:if="${folder.folderCount > 0}" th:text="|${folder.folderCount} dirs|"></span>
                <span th:if="${folder.fileCount > 0}" th:text="|, ${folder.fileCount} files|"></span>
            </span>
            <span th:if="${folder.assignedStatus != null}"
                  class="badge status-badge"
                  th:classappend="|status-${folder.assignedStatus.toLowerCase()}|"
                  th:text="${folder.assignedStatus}">STATUS</span>
            <span th:if="${folder.assignedStatus == null && folder.suggestedStatus != null}"
                  class="badge status-badge suggested"
                  th:classappend="|status-${folder.suggestedStatus.toLowerCase()}|"
                  th:text="${folder.suggestedStatus}">SUGGESTED</span>
            <div class="btn-group ms-2" role="group">
                <button type="button" class="btn btn-outline-danger action-btn"
                        th:onclick="|classifyFolder(${folder.id}, null, 'SKIP')|">S</button>
                <button type="button" class="btn btn-outline-warning action-btn"
                        th:onclick="|classifyFolder(${folder.id}, null, 'LOCATE')|">L</button>
                <button type="button" class="btn btn-outline-success action-btn"
                        th:onclick="|classifyFolder(${folder.id}, null, 'INDEX')|">I</button>
            </div>
        </div>
    </div>
</th:block>

</html>
