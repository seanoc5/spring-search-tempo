<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>[[#{profile.edit.headline}]]</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex flex-wrap mb-4">
        <h1 class="flex-grow-1">
            <i class="bi bi-pencil-square me-2"></i>[[#{profile.edit.headline}]]
        </h1>
        <div>
            <a th:href="@{/profile}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-1"></i>[[#{profile.back}]]
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/forms::globalErrors('springUser')}" />

    <div class="card">
        <div class="card-body">
            <form th:action="@{/profile/edit}" method="post" novalidate="">
                <!-- Hidden fields to preserve values -->
                <input type="hidden" th:field="*{springUser.id}" />
                <input type="hidden" th:field="*{springUser.label}" />
                <input type="hidden" th:field="*{springUser.enabled}" />

                <div class="row">
                    <div class="col-md-6">
                        <h5 class="text-muted mb-3">[[#{profile.personalInfo}]]</h5>

                        <div class="mb-3">
                            <label class="form-label">[[#{springUser.label.label}]]</label>
                            <input type="text" class="form-control" th:value="${springUser.label}" disabled />
                            <div class="form-text">Username cannot be changed</div>
                        </div>

                        <div class="mb-3">
                            <label for="firstName" class="form-label">[[#{springUser.firstName.label}]]</label>
                            <input type="text" class="form-control" id="firstName" th:field="*{springUser.firstName}"
                                   th:classappend="${#fields.hasErrors('springUser.firstName')} ? 'is-invalid'" />
                            <div th:if="${#fields.hasErrors('springUser.firstName')}" class="invalid-feedback"
                                 th:errors="*{springUser.firstName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="lastName" class="form-label">[[#{springUser.lastName.label}]]</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{springUser.lastName}"
                                   th:classappend="${#fields.hasErrors('springUser.lastName')} ? 'is-invalid'" />
                            <div th:if="${#fields.hasErrors('springUser.lastName')}" class="invalid-feedback"
                                 th:errors="*{springUser.lastName}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">[[#{springUser.email.label}]]</label>
                            <input type="email" class="form-control" id="email" th:field="*{springUser.email}"
                                   th:classappend="${#fields.hasErrors('springUser.email')} ? 'is-invalid'" />
                            <div th:if="${#fields.hasErrors('springUser.email')}" class="invalid-feedback"
                                 th:errors="*{springUser.email}"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <h5 class="text-muted mb-3">[[#{profile.changePassword}]]</h5>

                        <div class="mb-3">
                            <label for="password" class="form-label">[[#{springUser.password.label}]]</label>
                            <input type="password" class="form-control" id="password" th:field="*{springUser.password}"
                                   placeholder="Enter new password"
                                   th:classappend="${#fields.hasErrors('springUser.password')} ? 'is-invalid'" />
                            <div th:if="${#fields.hasErrors('springUser.password')}" class="invalid-feedback"
                                 th:errors="*{springUser.password}"></div>
                            <div class="form-text">Enter a new password to change it</div>
                        </div>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/profile}" class="btn btn-secondary">[[#{action.cancel}]]</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>[[#{profile.save}]]
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
