<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Running Jobs Fragment - auto-refreshed via HTMX -->
    <th:block th:fragment="running-jobs">
        <div th:if="${!runningJobs.empty}" class="card border-primary mb-4">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-arrow-repeat spin me-2"></i>
                    Running Jobs ([[${#lists.size(runningJobs)}]])
                </h5>
                <small class="text-white-50">Auto-refreshes every 5 seconds</small>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <thead>
                        <tr>
                            <th>Execution ID</th>
                            <th>Job Name</th>
                            <th>Started</th>
                            <th>Running For</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Stale threshold: 4 hours = 240 minutes -->
                        <tr th:each="job : ${runningJobs}"
                            th:classappend="${job.duration != null and job.duration.toHours() >= 4} ? 'table-warning' : ''">
                            <td>
                                <a th:href="@{/batch/{id}(id=${job.executionId})}"
                                   class="text-decoration-none fw-semibold">
                                    #[[${job.executionId}]]
                                </a>
                            </td>
                            <td>[[${job.jobName}]]</td>
                            <td>
                                <span th:if="${job.startTime != null}"
                                      th:text="${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                            </td>
                            <td>
                                <span th:if="${job.duration != null}"
                                      th:classappend="${job.duration.toHours() >= 4} ? 'text-danger fw-bold' : ''">
                                    <span th:if="${job.duration.toHours() > 0}"
                                          th:text="${job.duration.toHours() + ' hr ' + (job.duration.toMinutes() % 60) + ' min'}"></span>
                                    <span th:if="${job.duration.toHours() == 0 && job.duration.toMinutes() > 0}"
                                          th:text="${job.duration.toMinutes() + ' min ' + (job.duration.toSeconds() % 60) + ' sec'}"></span>
                                    <span th:if="${job.duration.toMinutes() == 0}"
                                          th:text="${job.duration.toSeconds() + ' sec'}"></span>
                                </span>
                            </td>
                            <td>
                                <!-- Show stale warning for jobs running > 4 hours -->
                                <span th:if="${job.duration != null and job.duration.toHours() >= 4}"
                                      class="badge bg-warning text-dark">
                                    <i class="bi bi-exclamation-triangle"></i> Likely Stale
                                </span>
                                <span th:if="${job.duration == null or job.duration.toHours() < 4}"
                                      class="badge bg-primary">
                                    <i class="bi bi-arrow-repeat spin"></i> Running
                                </span>
                            </td>
                            <td>
                                <!-- For stale jobs, show Mark as Failed button (HTMX with toast) -->
                                <th:block th:if="${job.duration != null and job.duration.toHours() >= 4}">
                                    <button type="button" class="btn btn-sm btn-danger"
                                            th:hx-post="@{/batch/{id}/mark-failed(id=${job.executionId})}"
                                            hx-target="#runningJobsContainer"
                                            hx-swap="innerHTML"
                                            hx-confirm="Mark this stale job as FAILED?">
                                        <i class="bi bi-x-circle"></i> Mark Failed
                                    </button>
                                </th:block>
                                <!-- For running jobs, show Stop button (HTMX with toast) -->
                                <th:block th:if="${job.duration == null or job.duration.toHours() < 4}">
                                    <button type="button" class="btn btn-sm btn-outline-warning"
                                            th:hx-post="@{/batch/{id}/stop(id=${job.executionId})}"
                                            hx-target="#runningJobsContainer"
                                            hx-swap="innerHTML"
                                            hx-confirm="Stop this job execution?">
                                        <i class="bi bi-stop-fill"></i> Stop
                                    </button>
                                </th:block>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <style>
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .spin {
                animation: spin 1s linear infinite;
                display: inline-block;
            }
        </style>
    </th:block>
</body>
</html>
