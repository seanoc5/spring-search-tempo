<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">
    <head>
        <title>Crawl Configurations</title>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="d-flex flex-wrap mb-4">
                <h1 class="flex-grow-1">Crawl Configurations</h1>
                <div>
                    <a th:href="@{/crawlConfigs/jobRuns}" class="btn btn-secondary ms-2">View Job Run History</a>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                [[${message}]]
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                [[${error}]]
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${!crawlConfigs.empty || filter != null}" class="row">
                <div th:replace="~{fragments/utils::searchFilter(object='crawlConfig')}" />
                <div th:replace="~{fragments/utils::sorting(object='crawlConfig', sortOptions=${ {'id,ASC', 'name,ASC', 'enabled,DESC'} }, columnClass='offset-lg-4')}" />
            </div>

            <div th:if="${crawlConfigs.empty}">No crawl configurations found.</div>
            <div th:if="${!crawlConfigs.empty}" class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Name</th>
                            <th scope="col">Label</th>
                            <th scope="col">Start Paths</th>
                            <th scope="col">Status</th>
                            <th scope="col">Files</th>
                            <th scope="col">Last Run</th>
                            <th><!-- Actions --></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="crawlConfig : ${crawlConfigs}">
                            <td>[[${crawlConfig.id}]]</td>
                            <td>[[${crawlConfig.name}]]</td>
                            <td>[[${crawlConfig.displayLabel}]]</td>
                            <td>
                                <span th:if="${crawlConfig.startPaths != null && !crawlConfig.startPaths.empty}">
                                    [[${#strings.listJoin(crawlConfig.startPaths, ', ')}]]
                                </span>
                            </td>
                            <td>
                                <button type="button"
                                        th:class="${crawlConfig.enabled} ? 'badge bg-success border-0' : 'badge bg-secondary border-0'"
                                        th:text="${crawlConfig.enabled} ? 'Enabled' : 'Disabled'"
                                        th:hx-post="@{/crawlConfigs/{id}/toggle-enabled(id=${crawlConfig.id})}"
                                        hx-swap="outerHTML"
                                        th:title="${crawlConfig.enabled} ? 'Click to disable' : 'Click to enable'"
                                        style="cursor: pointer;">
                                </button>
                            </td>
                            <td>
                                <a th:href="@{/crawlConfigs/{id}/files(id=${crawlConfig.id})}"
                                   th:text="${fileCounts[crawlConfig.id] ?: 0}"
                                   class="text-decoration-none">0</a>
                            </td>
                            <td>
                                <!-- TODO: Display last run time -->
                                -
                            </td>
                            <td>
                                <div class="float-end text-nowrap">
                                    <a th:href="@{/crawlConfigs/{id}(id=${crawlConfig.id})}" class="btn btn-sm btn-secondary">View</a>
                                    <form th:action="@{/crawlConfigs/{id}/run(id=${crawlConfig.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-primary"
                                                th:disabled="${!crawlConfig.enabled}">
                                            Run Crawl
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="~{fragments/utils::pagination()}" />
        </div>
    </body>
</html>
