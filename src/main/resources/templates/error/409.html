<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">
    <head>
        <title>409 - Conflict</title>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="text-center py-5">
                <h1 class="display-1 text-warning">409</h1>
                <h2 class="mb-4">Conflict</h2>
                <p class="lead text-muted" th:if="${message}" th:text="${message}">The operation could not be completed due to a conflict.</p>
                <p class="text-muted small" th:if="${path}">Path: <code th:text="${path}"></code></p>
                <div class="alert alert-warning mt-4" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    This item is still referenced by other records. Remove those references first before deleting.
                </div>
                <div class="mt-4">
                    <button onclick="history.back()" class="btn btn-primary">Go Back</button>
                    <a th:href="@{/}" class="btn btn-secondary ms-2">Go Home</a>
                </div>
            </div>
        </div>
    </body>
</html>
