<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">
    <head>
        <title>500 - Internal Server Error</title>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="text-center py-5">
                <h1 class="display-1 text-danger">500</h1>
                <h2 class="mb-4">Internal Server Error</h2>
                <p class="lead text-muted" th:if="${message}" th:text="${message}">An unexpected error occurred.</p>
                <p class="text-muted small" th:if="${path}">Path: <code th:text="${path}"></code></p>
                <div class="alert alert-info mt-4" role="alert">
                    <i class="bi bi-info-circle me-2"></i>
                    The error has been logged. If this problem persists, please contact support.
                </div>
                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-primary">Go Home</a>
                    <button onclick="location.reload()" class="btn btn-secondary ms-2">Try Again</button>
                </div>
            </div>
        </div>
    </body>
</html>
