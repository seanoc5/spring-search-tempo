server:
  port: 8082
spring:
  devtools:
    restart:
      # More reliable auth/session behavior during development.
      # Frequent classloader restarts are a common source of re-auth surprises.
      enabled: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false  # Jobs should run from UI/API or scheduler, not on app startup
  datasource:
    # Default dev target is bare-metal PostgreSQL on minti9.
    # Use `--spring.profiles.active=dev,docker` to use docker-compose (localhost:15432).
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://minti9:5432/tempo}
    username: ${JDBC_DATABASE_USERNAME:tempo}
    password: ${JDBC_DATABASE_PASSWORD:password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  docker:
    compose:
      lifecycle-management: start-only
      # Docker profile overrides this to true.
      enabled: false
  session:
    # Keep session state in DB for better resilience across app restarts.
    store-type: jdbc
    jdbc:
      initialize-schema: never
      table-name: SPRING_SESSION
    timeout: 30d

app:
  security:
    # In dev, stateless remember-me avoids DB token-rotation races and is very stable.
    remember-me-persistent: false
