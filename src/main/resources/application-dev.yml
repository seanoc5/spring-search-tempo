server:
  port: 8085
spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true
      name: fsCrawlJob
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://linyoga:5432/tempo}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  docker:
    compose:
      lifecycle-management: start-only
  session:
    jdbc.initialize-schema: always
