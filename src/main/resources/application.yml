server:
  port: 8082

spring:
  devtools:
    restart:
      enabled: true  # Disable DevTools restart - can corrupt batch job transactions
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false  # Disable auto-run - jobs are triggered via UI/API
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/tempo}
    username: ${JDBC_DATABASE_USERNAME:tempo}
    password: ${JDBC_DATABASE_PASSWORD:password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          lob:
            non_contextual_creation: true
        order_inserts: true
        order_updates: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: mxbai-embed-large
          truncate: true
  docker:
    compose:
      lifecycle-management: start-only
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never  # Tables created via docs/sql/013-add-session-remember-me.sql
      table-name: SPRING_SESSION
    timeout: 8h  # Session timeout (8 hours of inactivity)

error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    codes:
      FSFileUriUnique: FSFILE_URI_UNIQUE
      FSFolderUriUnique: FSFOLDER_URI_UNIQUE
      AnnotationLabelUnique: ANNOTATION_LABEL_UNIQUE
      SpringUserLabelUnique: SPRING_USER_LABEL_UNIQUE
      SpringRoleLabelUnique: SPRING_ROLE_LABEL_UNIQUE
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

app:
  host-name: "${TEMPO_HOST_NAME:localhost}"
  security:
    remember-me-key: "${REMEMBER_ME_KEY:spring-search-tempo-remember-me-key}"
  crawl:
    # Global defaults that all crawls inherit
    defaults:
      max-depth: 10
      follow-links: false
      parallel: false
      # Hours threshold for "recent crawl" skip logic.
      # If a folder was crawled by another config within this many hours,
      # the current crawl can skip that subtree (only at crawl config root dirs).
      recent-crawl-skip-hours: 24
      folder-patterns:
        # SKIP: Persist folder metadata but don't crawl children (processing stops here)
        skip:
          - ".*/\\.git/.*"
          - ".*/\\.gradle/.*"
          - ".*/\\.idea/.*"
          - ".*/build/.*"
          - ".*/out/.*"
          - ".*/target/.*"
          - ".*/dist/.*"
          - ".*/node_modules/.*"
          - ".*/vendor/.*"
          - ".*/packages/.*"
          - "/tmp/.*"
          - "/run/.*"
          - "/root/.*"
          - "/proc/.*"
          - "/sys/.*"
          - "/dev/.*"
#          - "/mnt/.*"
#          - "/media/.*"
          - "/lost\\+found/.*"
      file-patterns:
        # SKIP: Persist file metadata only (no text extraction)
        skip:
          - ".*\\.(lck|tmp|~|bak|bk1|bk2)$"
          - ".*/(deleteme.*|ignoreme.*)"

    # Crawl configurations are now managed in the database.
    # Seed data: docs/sql/012-seed-crawl-configs.sql
    # Edit via UI: /crawlConfigs/{id}/edit

  # Email crawling configuration
  email:
    enabled: true  # Enable when ready to crawl email
    quick-sync-folders:
      - "INBOX"
      - "Sent"
    accounts:
      # Gmail account (requires App Password)
      # To enable:
      # 1. Go to https://myaccount.google.com/apppasswords
      # 2. Generate an app password for "Mail"
      # 3. Export GMAIL_APP_PASSWORD=<your-app-password>
      # 4. Export GMAIL_EMAIL=<your-gmail-address>
      - name: "personal-gmail"
        email: "${GMAIL_EMAIL:sean.oconnor@stvfd.org}"
        provider: "GMAIL"
        credential-env-var: "GMAIL_APP_PASSWORD"
        enabled: true

      # Amazon WorkMail account
      # To enable:
      # 1. Get your WorkMail username (usually email address)
      # 2. Export WORKMAIL_EMAIL=<your-workmail-email>
      # 3. Export WORKMAIL_PASSWORD=<your-workmail-password>
      - name: "work-email"
        email: "${WORKMAIL_EMAIL:sean@oconeco.com}"
        provider: "WORKMAIL"
        imap-host: "imap.mail.us-east-1.awsapps.com"
        imap-port: 993
        region: "us-east-1"
        credential-env-var: "WORKMAIL_PASSWORD"
        enabled: true

  embedding:
    enabled: true
    model-name: mxbai-embed-large
    max-text-length: 8192
    batch-size: 10
  # OneDrive integration (OAuth2 + PKCE, Microsoft Graph API)
  onedrive:
    enabled: false
    client-id: "${ONEDRIVE_CLIENT_ID:}"
    redirect-uri: "http://localhost:8089/oneDriveAccounts/callback"
    scopes:
      - "Files.Read"
      - "offline_access"
      - "User.Read"
    token-encryption-key: "${ONEDRIVE_TOKEN_ENCRYPTION_KEY:}"
    download-temp-dir: "/tmp/onedrive-downloads"
    max-download-size-mb: 100

      # Generic IMAP server example
      # - name: "custom-imap"
      #   email: "${CUSTOM_EMAIL:}"
      #   provider: "GENERIC_IMAP"
      #   imap-host: "imap.example.com"
      #   imap-port: 993
      #   credential-env-var: "CUSTOM_IMAP_PASSWORD"
      #   enabled: false
