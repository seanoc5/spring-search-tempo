spring:
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: true
      name: fsCrawlJob
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/tempo}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  docker:
    compose:
      lifecycle-management: start-only
  session:
    jdbc.initialize-schema: embedded
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    codes:
      FSFileUriUnique: FSFILE_URI_UNIQUE
      FSFolderUriUnique: FSFOLDER_URI_UNIQUE
      AnnotationLabelUnique: ANNOTATION_LABEL_UNIQUE
      SpringUserLabelUnique: SPRING_USER_LABEL_UNIQUE
      SpringRoleLabelUnique: SPRING_ROLE_LABEL_UNIQUE
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
server:
  port: 8089

app:
  crawl:
    # Global defaults that all crawls inherit
    defaults:
      max-depth: 10
      follow-links: false
      parallel: false
      folder-patterns:
        skip:
          - ".*/\\.git/.*"
          - ".*/\\.gradle/.*"
          - ".*/\\.idea/.*"
          - ".*/build/.*"
          - ".*/out/.*"
          - ".*/target/.*"
          - ".*/dist/.*"
          - ".*/node_modules/.*"
          - ".*/vendor/.*"
          - ".*/packages/.*"
          - "/tmp/.*"
          - "/run/.*"
          - "/root/.*"
          - "/proc/.*"
          - "/sys/.*"
          - "/dev/.*"
          - "/mnt/.*"
          - "/media/.*"
          - "/lost\\+found/.*"
      file-patterns:
        skip:
          - ".*\\.(lck|tmp|~|bak|bk1|bk2)$"
          - ".*/(deleteme.*|ignoreme.*)"

    # List of crawl definitions
    crawls:
      - name: "USER_DOCUMENTS"
        label: "User Documents"
        enabled: true
        start-path: "${user.home}/Documents"
        max-depth: 15
        parallel: true
        folder-patterns:
          index:
            - ".*"
        file-patterns:
          index:
            - ".*\\.(txt|md|pdf|docx?|xlsx?|pptx?|odt|rtf|csv)$"
          analyze:
            - ".*\\.(md|txt)$"

      - name: "USER_PICTURES"
        label: "User Pictures"
        enabled: true
        start-path: "${user.home}/Pictures"
        max-depth: 8
        folder-patterns:
          skip:
            - ".*/\\.thumbnails/.*"
            - ".*/cache/.*"
          locate:
            - ".*"
        file-patterns:
          locate:
            - ".*\\.(jpg|jpeg|png|gif|bmp|svg|webp|heic|tiff|raw)$"

      - name: "WORK"
        label: "Work Projects"
        enabled: true
        start-path: "/opt/work"
        max-depth: 10
        parallel: true
        folder-patterns:
          index:
            - ".*"
        file-patterns:
          index:
            - ".*\\.(kt|java|py|js|ts|go|rs|c|cpp|h|hpp|sh|bash)$"
            - ".*\\.(xml|json|ya?ml|toml|properties|conf|config|ini)$"
            - ".*\\.(md|txt|rst|adoc)$"
            - ".*/Dockerfile$"
            - ".*/(Makefile|Rakefile|Gemfile|build\\.gradle.*|pom\\.xml)$"
          analyze:
            - ".*\\.(md|txt)$"

      - name: "CONFIG"
        label: "System Configuration"
        enabled: false
        start-path: "/etc"
        max-depth: 3
        folder-patterns:
          locate:
            - ".*"
        file-patterns:
          index:
            - ".*\\.(conf|cfg|config|ini)$"
            - ".*/.*\\.d/.*$"

      - name: "SYSTEM_USR"
        label: "System /usr Files"
        enabled: false
        start-path: "/usr"
        max-depth: 5
        folder-patterns:
          locate:
            - ".*"
        file-patterns:
          locate:
            - ".*"

      - name: "SYSTEM_BOOT"
        label: "System /boot Files"
        enabled: false
        start-path: "/boot"
        max-depth: 3
        folder-patterns:
          locate:
            - ".*"
        file-patterns:
          locate:
            - ".*"

      - name: "USER_DOWNLOADS"
        label: "User Downloads"
        enabled: true
        start-path: "${user.home}/Downloads"
        max-depth: 5
        folder-patterns:
          index:
            - ".*"
        file-patterns:
          skip:
            - ".*\\.(iso|dmg|exe|msi|app|deb|rpm|pkg)$"
          index:
            - ".*\\.(pdf|txt|md|docx?|xlsx?|csv)$"

      - name: "USER_DESKTOP"
        label: "User Desktop"
        enabled: true
        start-path: "${user.home}/Desktop"
        max-depth: 5
        folder-patterns:
          index:
            - ".*"
        file-patterns:
          index:
            - ".*\\.(txt|md|pdf|docx?|xlsx?|pptx?|odt|rtf)$"

